<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Bubulle | Exercice jQuery</title>
	<style>
	body { font-family:Calibri, sans-serif; }
	#nav { position:relative; background-color:#444; z-index: 0; }
	#menu { display:flex; flex-direction:row; position:relative; z-index: 2; }
	#menu a { color:#fff; flex:1; padding:1rem; text-align:center; text-decoration:none; font-size:1.5rem; }
	#bubulle { 
		background-color:#c048; 
		border-radius:8px;
		position:absolute; 
		top:-8px; left:40vw; 
		width:20vw;
		height:4.8rem;
		z-index: 1;
		opacity: 0;
		transition: all 600ms;
	}
	#nav:hover #bubulle { opacity: 1; }

	
	@media screen and (max-width:560px) { 
		#menu { flex-direction:column; }
		#bubulle { transition: all 400ms; }
	}
	</style>
</head>
<body>
	<nav id="nav">
		<div id="menu">
			<a href="#">Africa</a>
			<a href="#">America</a>
			<a href="#">Asia</a>
			<a href="#">Europa</a>
			<a href="#">Oceania</a>
		</div>
		<div id="bubulle"></div>
	</nav>
	<script src="jquery.min.js"></script>
	<script>
		$(document).ready(function() {
			const $nav = $("#nav");
			const $bub = $("#bubulle");

			$("#menu a").on("mouseenter", function () {
				const $a = $(this);

				// positions par rapport au nav

				const navOffset = $nav.offset();
				const aOffset = $a.offset();

				const left = aOffset.left - navOffset.left;
				const top = aOffset.top - navOffset.top - 8; // 8px en haut
				const width = $a.outerWidth();
				const height = $a.outerHeight() + 16; // 8px haut + 8px bas
				
				// on applique à la bulle
				$bub.css({
					left: left + "px",
					top: top + "px",
					width: width + "px",
					height: height + "px"
				});
			});
		});
	</script>
</body>
</html>
